name: decision_dungeon
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Jacquard12
      fonts:
        - asset: assets/fonts/Jacquard12-Regular.ttf

    - family: Kings
      fonts:
        - asset: assets/fonts/Kings-Regular.ttf

    - family: MedievalSharp
      fonts:
        - asset: assets/fonts/MedievalSharp-Regular.ttf
